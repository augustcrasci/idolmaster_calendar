<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이마스 통합 캘린더</title>
  <style>
    :root{--c-765:#f34e6c;--c-ml:#ffc20b;--c-gk:#f39800;--c-sm:#11be93;--c-cg:#2581c7;--c-sc:#8dbaff;--c-ds:#5f6368;--c-multi:#9c27b0;--bg:#f4f6f8;--bg-grad-start:#f7f4fb;--bg-grad-end:#e9eff8;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--soft:#f3f4f6;--hero-glow:radial-gradient(circle at top right, rgba(243,78,108,.18), transparent 28%),radial-gradient(circle at top left, rgba(141,186,255,.16), transparent 24%),radial-gradient(circle at center top, rgba(255,194,11,.14), transparent 26%);--selected-bg:#111827;--selected-text:#fff;--selected-line:#111827;--event-surface:#ffffff;--event-highlight-surface:#fff9fc;--week-surface:#ffffff}
    body.dark{--bg:#0f172a;--bg-grad-start:#0b1220;--bg-grad-end:#111827;--card:#111827;--line:#263244;--text:#e5e7eb;--muted:#94a3b8;--soft:#1f2937;--hero-glow:rgba(255,255,255,.04);--selected-bg:#334155;--selected-text:#f8fafc;--selected-line:#475569;--event-surface:#182234;--event-highlight-surface:#1e293b;--week-surface:#162033}
    *{box-sizing:border-box}body{margin:0;padding:20px;background:linear-gradient(180deg,var(--bg-grad-start) 0%,var(--bg-grad-end) 100%);color:var(--text);font-family:"Pretendard","Noto Sans KR",sans-serif;transition:background .2s ease,color .2s ease}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(15,23,42,.05)}
    body.dark .panel{box-shadow:0 10px 28px rgba(0,0,0,.28)}
    .header,.month-nav,.header-controls,.filter-row,.color-picker,.modal-header,.modal-actions,.fav-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .header{justify-content:space-between;padding:18px 22px;margin-bottom:14px;position:relative;overflow:hidden}.header::before{content:"";position:absolute;inset:0;background:var(--hero-glow);pointer-events:none}.filter-section{padding:16px 22px;margin-bottom:18px}.filter-row+.filter-row{margin-top:12px}.filter-label{min-width:84px;color:var(--muted);font-weight:700;font-size:.9rem}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}.weekday-grid{margin-bottom:10px}.weekday-header{text-align:center;color:var(--muted);font-size:.88rem;font-weight:800;padding:10px 0}.calendar-body{min-height:540px}.list-body{display:grid;grid-template-columns:minmax(0,1fr);gap:12px}.list-date-title{padding:8px 4px 2px;font-size:.95rem;font-weight:900;color:var(--text)}.list-date-title.today{color:var(--c-765)}.list-event{position:relative;border:1px solid var(--line);border-left:5px solid;border-radius:14px;background:var(--card);padding:13px 58px 13px 14px;cursor:pointer;display:grid;gap:8px;box-shadow:0 6px 16px rgba(15,23,42,.05)}.list-event.highlight{background:var(--event-highlight-surface);box-shadow:0 10px 22px rgba(15,23,42,.08)}.list-event.past{filter:saturate(.5);opacity:.78}.list-event-title{font-size:.98rem;font-weight:800;line-height:1.45;color:var(--text)}.list-event-meta{display:flex;flex-wrap:wrap;gap:8px}.list-chip{display:inline-flex;align-items:center;justify-content:center;min-height:28px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:var(--soft);font-size:.77rem;font-weight:700;color:var(--muted)}.list-chip.today{background:#fff3bf;color:#8f5b00;border-color:#ffe066}.list-chip.ended{background:#f1f3f5;color:#5f6368}.list-link{display:inline-flex;align-items:center;gap:6px;width:max-content;font-size:.82rem;font-weight:700;color:var(--c-cg);text-decoration:none}.list-link:hover{text-decoration:underline}
    .day-cell{min-height:186px;padding:8px;border-radius:14px;border:1px solid var(--line);background:var(--card);display:flex;flex-direction:column;gap:4px;overflow:visible}.day-cell.other-month{opacity:.45;background:#f8fafc}.cell-bg-red{background:#fff5f5;border-color:#ffc9c9}.cell-bg-yellow{background:#fff9db;border-color:#fcc419}.cell-bg-blue{background:#e7f5ff;border-color:#a5d8ff}
    .date-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}.date-header-left{display:flex;align-items:center;gap:6px}.date-num{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border-radius:999px;cursor:pointer;font-weight:800;color:var(--muted)}.date-num:hover{background:#edf2f7}.today-badge{background:var(--c-765);color:#fff}.memo-trigger{width:22px;height:22px;border-radius:999px;padding:0;font-size:.75rem;line-height:1}
    .holiday-box{text-align:right;font-size:.68rem;font-weight:700;line-height:1.2}.hl-kr{color:#e03131}.hl-jp{color:#1971c2}.memo-block{background:#fff8c5;border-left:3px solid #f59f00;border-radius:8px;padding:5px 8px;font-size:.74rem;color:#7c5800;white-space:pre-wrap;cursor:pointer}
    .event-item{cursor:pointer;border-radius:8px;padding:6px 62px 6px 8px;font-size:.74rem;line-height:1.32;word-break:keep-all;transition:filter .18s ease,opacity .18s ease;position:relative}.event-item.headline{background:var(--event-surface);border:1px solid var(--line);border-left:4px solid;font-weight:500}.event-item.highlight{background:var(--event-highlight-surface);border-left-width:8px;box-shadow:0 6px 14px rgba(15,23,42,.12);font-size:.79rem;font-weight:800;transform:translateY(-1px)}.event-item.past{filter:saturate(.45);opacity:.72;padding-right:70px}.event-item.past.highlight{filter:saturate(.65);opacity:.84}.event-item.past::after{content:"종료";position:absolute;top:5px;right:34px;padding:1px 5px;border-radius:999px;background:rgba(107,114,128,.16);color:var(--muted);font-size:.58rem;font-weight:800;letter-spacing:.02em}.event-icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:999px;margin-right:6px;background:rgba(17,24,39,.08);vertical-align:middle}.event-icon svg{width:13px;height:13px;display:block}.event-fav{position:absolute;top:50%;right:6px;transform:translateY(-50%);width:24px;height:24px;border-radius:999px;padding:0;border:1px solid var(--line);background:var(--card);color:var(--muted);display:inline-flex;align-items:center;justify-content:center}.event-fav svg{width:13px;height:13px;display:block}.event-fav.active{background:#f59f00;border-color:#f59f00;color:#fff}
    .dots-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:auto;padding-top:2px}.event-dot{width:8px;height:8px;border-radius:50%;cursor:pointer}.long-term-bar{height:6px;border-radius:999px;cursor:pointer;opacity:.9;margin-bottom:3px;position:relative}.week-spanning{padding:6px 8px;border-radius:10px;background:var(--week-surface);border-left:5px solid;font-size:.8rem;font-weight:700;cursor:pointer;position:relative}
    .event-dot.past,.long-term-bar.past,.week-spanning.past{filter:saturate(.45);opacity:.55}.long-term-bar.past::after,.week-spanning.past::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(107,114,128,.08),rgba(107,114,128,.08) 6px,transparent 6px,transparent 12px);border-radius:inherit;pointer-events:none}
    button,select{border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--text);font:inherit}button{padding:8px 14px;cursor:pointer;font-weight:700}button.active{background:var(--selected-bg);border-color:var(--selected-line);color:var(--selected-text)}
    .pill-checkbox input{display:none}.pill-checkbox span{display:inline-block;padding:7px 12px;background:var(--soft);border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:.85rem;cursor:pointer;user-select:none}.pill-checkbox input:checked+span{background:var(--selected-bg);color:var(--selected-text);border-color:var(--selected-line);font-weight:700;box-shadow:0 0 0 1px rgba(255,255,255,.04) inset}.vip-select{padding:8px 10px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);align-items:center;justify-content:center;z-index:1000;padding:18px}.modal-content{width:min(520px,100%);max-height:82vh;overflow-y:auto;background:var(--card);color:var(--text);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 16px 36px rgba(15,23,42,.2)}
    .group-item{border:1px solid var(--line);border-left:4px solid;border-radius:10px;padding:10px 12px;margin-top:10px;background:color-mix(in srgb, var(--card) 88%, var(--soft) 12%)}.modal-link{display:inline-block;margin-top:8px;padding:8px 12px;background:var(--selected-bg);color:var(--selected-text);border-radius:10px;text-decoration:none}
    .memo-input{width:100%;height:110px;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:10px;padding:10px;resize:vertical;font:inherit}.color-opt{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);cursor:pointer}.color-opt.selected{border-color:var(--selected-line);transform:scale(1.08)}.fav-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px}.fav-modal{width:min(760px,100%)}.fav-list{display:grid;gap:12px;margin-top:12px}.fav-list.compact{gap:8px}.fav-card{border:1px solid var(--line);border-radius:14px;background:var(--card);padding:14px 16px;display:grid;gap:10px}.fav-card.compact{padding:10px 12px;gap:7px}.fav-card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.fav-brand{font-weight:800;display:inline-flex;align-items:center;min-height:24px}.fav-status{display:inline-flex;align-items:center;justify-content:center;min-width:108px;gap:4px;padding:5px 11px;border-radius:999px;font-size:.75rem;font-weight:800;text-align:center}.fav-status.today{background:#fff3bf;color:#8f5b00}.fav-status.upcoming{background:#e7f5ff;color:#1864ab}.fav-status.past{background:#f1f3f5;color:#5f6368}.fav-title-btn{padding:0;border:none;background:none;color:var(--text);font:inherit;font-weight:800;text-align:left;line-height:1.45;font-size:.96rem}.fav-title-btn:hover{text-decoration:underline}.fav-card.compact .fav-title-btn{font-size:.88rem;line-height:1.35}.fav-meta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px 14px}.fav-card.compact .fav-meta{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px 10px}.fav-field{display:grid;gap:4px}.fav-field-label{font-size:.72rem;font-weight:800;color:var(--muted)}.fav-field-value{font-size:.86rem;line-height:1.4;color:var(--text);word-break:keep-all}.fav-card-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}.fav-card.compact .fav-card-actions{justify-content:space-between}.fav-link{white-space:nowrap}.fav-remove{padding:6px 10px;font-size:.78rem;white-space:nowrap}.fav-empty{padding:18px 0;color:var(--muted)}.updates-summary{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.updates-chip{display:inline-flex;align-items:center;justify-content:center;padding:6px 11px;border-radius:999px;background:var(--soft);border:1px solid var(--line);font-size:.76rem;font-weight:800;color:var(--muted)}.updates-heading{margin-top:14px;font-size:.82rem;font-weight:900;color:var(--muted)}@media(max-width:700px){.fav-meta{grid-template-columns:1fr 1fr}.fav-card.compact .fav-meta{grid-template-columns:1fr 1fr}.fav-modal{width:min(620px,100%)}}@media(max-width:520px){.fav-meta{grid-template-columns:1fr}.fav-card.compact .fav-meta{grid-template-columns:1fr}.fav-card{padding:12px 13px}.fav-card-top{align-items:flex-start}}
    @media(max-width:960px){body{padding:12px}.header{flex-direction:column;align-items:stretch}.calendar-grid{gap:6px}.day-cell{min-height:132px}}
  </style>
</head>
<body>
  <div class="panel header">
    <div class="month-nav"><button id="btn-prev">&lt;</button><strong id="current-month-display"></strong><button id="btn-next">&gt;</button></div>
    <div class="header-controls">
      <label class="pill-checkbox"><input type="checkbox" id="chk-hol-kr" checked><span>한국 공휴일</span></label>
      <label class="pill-checkbox"><input type="checkbox" id="chk-hol-jp" checked><span>일본 공휴일</span></label>
      <button id="btn-today">오늘</button><button id="btn-month" class="active">월간</button><button id="btn-week">주간</button><button id="btn-list">리스트</button><button id="btn-favorites">관심 일정</button><button id="btn-updates">업데이트 변경</button><button id="btn-theme">다크모드</button>
    </div>
  </div>

  <div class="panel filter-section">
    <div class="filter-row" id="brand-filters">
      <span class="filter-label">브랜드</span>
      <label class="pill-checkbox"><input type="checkbox" value="합동/전체" checked><span>합동</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="765PRO" checked><span>765PRO</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="신데렐라 걸즈" checked><span>신데렐라</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="밀리언 라이브" checked><span>밀리언</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="SideM" checked><span>SideM</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="샤이니 컬러즈" checked><span>샤이니</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="학원마스" checked><span>학원마스</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="기타" checked><span>기타</span></label>
    </div>
    <div class="filter-row" id="category-filters">
      <span class="filter-label">종류</span>
      <label class="pill-checkbox"><input type="checkbox" value="LIVE" checked><span>라이브</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="BROADCAST" checked><span>방송</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="GOODS" checked><span>굿즈/기타</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="BIRTHDAY" checked><span>생일</span></label>
      <label class="pill-checkbox"><input type="checkbox" value="TICKET" checked><span>티켓</span></label>
    </div>
    <div class="filter-row"><span class="filter-label">강조</span><select id="vip-highlight" class="vip-select"><option value="LIVE">라이브 강조</option><option value="BROADCAST">방송 강조</option><option value="GOODS">굿즈/기타 강조</option><option value="BIRTHDAY">생일 강조</option><option value="TICKET">티켓 강조</option></select><label class="pill-checkbox"><input type="checkbox" id="chk-favorites-only"><span>좋아요만 보기</span></label></div>
  </div>

  <div id="weekday-row" class="calendar-grid weekday-grid"><div class="weekday-header" style="color:#e03131">일</div><div class="weekday-header">월</div><div class="weekday-header">화</div><div class="weekday-header">수</div><div class="weekday-header">목</div><div class="weekday-header">금</div><div class="weekday-header" style="color:#1971c2">토</div></div>
  <div class="calendar-grid calendar-body" id="calendar-body"></div>

  <div id="single-modal" class="modal-overlay" onclick="closeModal('single-modal',event)"><div class="modal-content" onclick="event.stopPropagation()"><div class="modal-header"><span id="s-modal-brand" style="font-size:.8rem;font-weight:700;color:#fff;border-radius:999px;padding:5px 10px;"></span><button type="button" onclick="closeModal('single-modal',true)">닫기</button></div><h3 id="s-modal-title"></h3><p><strong>일정:</strong> <span id="s-modal-date"></span></p><p><strong>분류:</strong> <span id="s-modal-category"></span></p><div class="modal-actions"><button type="button" id="s-modal-favorite">☆ 관심 일정 추가</button><a id="s-modal-link" class="modal-link" target="_blank" rel="noopener noreferrer" href="#">자세히 보기</a></div></div></div>
  <div id="group-modal" class="modal-overlay" onclick="closeModal('group-modal',event)"><div class="modal-content" onclick="event.stopPropagation()"><div class="modal-header"><span id="g-modal-brand" style="font-size:.8rem;font-weight:700;color:#fff;border-radius:999px;padding:5px 10px;"></span><button type="button" onclick="closeModal('group-modal',true)">닫기</button></div><h3 id="g-modal-title"></h3><div id="g-modal-body"></div></div></div><div id="favorites-modal" class="modal-overlay" onclick="closeModal('favorites-modal',event)"><div class="modal-content fav-modal" onclick="event.stopPropagation()"><div class="fav-toolbar"><h3 style="margin:0;">관심 일정</h3><div class="header-controls" style="gap:8px;"><button type="button" id="btn-fav-compact" onclick="toggleFavoriteCompactView()">간략 보기</button><button type="button" onclick="closeModal('favorites-modal',true)">닫기</button></div></div><div id="favorites-modal-body"></div></div></div><div id="updates-modal" class="modal-overlay" onclick="closeModal('updates-modal',event)"><div class="modal-content fav-modal" onclick="event.stopPropagation()"><div class="fav-toolbar"><h3 style="margin:0;">업데이트 변경</h3><button type="button" onclick="closeModal('updates-modal',true)">닫기</button></div><div id="updates-modal-body"></div></div></div>
  <div id="memo-modal" class="modal-overlay" onclick="closeMemo(event)"><div class="modal-content" onclick="event.stopPropagation()"><div class="modal-header"><h3 id="memo-date-title" style="margin:0;"></h3><button type="button" onclick="closeMemo(true)">닫기</button></div><p style="color:var(--muted);font-size:.85rem;">날짜 배경색과 메모를 저장합니다.</p><div class="color-picker"><div class="color-opt" id="c-none" style="background:#f8f9fa" onclick="setMemoColor('')"></div><div class="color-opt" id="c-red" style="background:#fff5f5;border-color:#ffc9c9" onclick="setMemoColor('red')"></div><div class="color-opt" id="c-yellow" style="background:#fff9db;border-color:#fcc419" onclick="setMemoColor('yellow')"></div><div class="color-opt" id="c-blue" style="background:#e7f5ff;border-color:#a5d8ff" onclick="setMemoColor('blue')"></div></div><textarea id="memo-text" class="memo-input" placeholder="이 날짜에 표시할 메모를 입력하세요."></textarea><div style="margin-top:10px;text-align:right;"><button type="button" onclick="saveMemo()" class="active">저장</button></div></div></div>

  <script>
    const BRAND_META={'합동/전체':{color:'var(--c-multi)',order:1},'765PRO':{color:'var(--c-765)',order:2},'신데렐라 걸즈':{color:'var(--c-cg)',order:3},'밀리언 라이브':{color:'var(--c-ml)',order:4},'SideM':{color:'var(--c-sm)',order:5},'샤이니 컬러즈':{color:'var(--c-sc)',order:6},'학원마스':{color:'var(--c-gk)',order:7},'기타':{color:'var(--c-ds)',order:8}};
    const BRAND_ALIASES=[{name:'합동/전체',aliases:['합동','전체','티켓합동','multi','all']},{name:'765PRO',aliases:['765','765as','allstars','765pro']},{name:'신데렐라 걸즈',aliases:['신데렐라','シンデレラ','cinderella','cg','deresute']},{name:'밀리언 라이브',aliases:['밀리언','ミリオン','million','mltd','millionlive']},{name:'SideM',aliases:['sidem','315']},{name:'샤이니 컬러즈',aliases:['샤이니','シャニ','shiny','shinycolors','283production']},{name:'학원마스',aliases:['학원마스','학마스','학원','学園','gakumas']},{name:'기타',aliases:['기타','other','.kr','961프로','961プロ','ds','디어리스타즈','ゼノグラシア','ヴイアラ','その他']}];
    let allEvents=[],currentDate=new Date(),viewMode='month',holidayData={},changeSummary={summary:{added:0,removed:0,changed:0},sources:{},recent_added:[]},selectedMemoDate='',selectedMemoColor='';window.eventDataMap={};window.groupDataMap={};
    const escapeHtml=t=>String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const normalizeText=v=>String(v||'').toLowerCase().replace(/[\s\p{P}\p{S}_]+/gu,'');
    const getLocalYMD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const extractTime=v=>{const m=String(v||'').match(/(\d{1,2})[:：](\d{2})/);return m?`${m[1].padStart(2,'0')}:${m[2]}`:'99:99'};
    const createId=p=>`${p}_${Math.random().toString(36).slice(2,10)}`;
    const makeEventKey=e=>[e.type,e.title,e.startDate,e.endDate,e.link||''].join('|');
    const getFavoriteKeys=()=>new Set(JSON.parse(localStorage.getItem('imas_favorites')||'[]'));
    const saveFavoriteKeys=keys=>localStorage.setItem('imas_favorites',JSON.stringify([...keys]));

    function findNextRecurringEvent(base){const today=getLocalYMD(new Date());if(base.type==='birthday')return allEvents.filter(e=>e.type==='birthday'&&e.title===base.title&&e.startDate>today).sort((a,b)=>`${a.startDate} ${a.time}`.localeCompare(`${b.startDate} ${b.time}`))[0]||null;if(base.type==='broadcast'&&isRegularProgram(base))return allEvents.filter(e=>e.type==='broadcast'&&e.title===base.title&&e.brandName===base.brandName&&e.startDate>today).sort((a,b)=>`${a.startDate} ${a.time}`.localeCompare(`${b.startDate} ${b.time}`))[0]||null;return null;}
    function formatStatusLabel(e){const today=new Date();today.setHours(0,0,0,0);const start=new Date(e.startDate);start.setHours(0,0,0,0);const end=new Date(e.endDate);end.setHours(0,0,0,0);const nextRecurring=findNextRecurringEvent(e);if(end<today){if(nextRecurring){const diff=Math.round((new Date(nextRecurring.startDate).setHours(0,0,0,0)-today)/86400000);return {cls:'past',label:`\uc9c0\ub098\uac10 / D-${diff}`};}return {cls:'past',label:'\uc9c0\ub098\uac10'};}const diff=Math.round((start-today)/86400000);if(diff===0){const nextLabel=nextRecurring?` / \ub2e4\uc74c D-${Math.round((new Date(nextRecurring.startDate).setHours(0,0,0,0)-today)/86400000)}`:'';return {cls:'today',label:`\ub2f9\uc77c!!${nextLabel}`};}if(diff>0)return {cls:'upcoming',label:`D-${diff}`};return {cls:'today',label:'\uc9c4\ud589\uc911'};}
    function renderFavoriteCard(e,compact=false){const status=formatStatusLabel(e);return `<div class="fav-card ${compact?'compact':''}"><div class="fav-card-top"><span class="fav-brand" style="color:${e.color};">${escapeHtml(e.brandName)}</span><span class="fav-status ${status.cls}">${escapeHtml(status.label)}</span></div><button class="fav-title-btn" type="button" onclick="openSingleModal('${e.id}')">${escapeHtml(e.title)}</button><div class="fav-meta"><div class="fav-field"><span class="fav-field-label">종류</span><span class="fav-field-value">${escapeHtml(formatTypeLabel(e.type))}</span></div><div class="fav-field"><span class="fav-field-label">날짜</span><span class="fav-field-value">${escapeHtml(e.rawDateText||e.startDate)}</span></div><div class="fav-field"><span class="fav-field-label">링크</span><span class="fav-field-value">${e.link?`<a class="fav-link" href="${escapeHtml(e.link)}" target="_blank" rel="noopener noreferrer">바로가기</a>`:'-'}</span></div></div><div class="fav-card-actions"><button class="fav-remove" type="button" onclick="toggleFavoriteById('${e.id}')">해제</button></div></div>`}function openFavoritesModal(){const body=document.getElementById('favorites-modal-body');const favoriteKeys=getFavoriteKeys();const compact=isFavoriteCompactView();syncFavoriteCompactButton();const items=allEvents.filter(e=>favoriteKeys.has(e.eventKey)).sort((a,b)=>`${a.startDate} ${a.time}`.localeCompare(`${b.startDate} ${b.time}`));if(!items.length){body.innerHTML='<div class="fav-empty">아직 표시해 둔 관심 일정이 없습니다.</div>';document.getElementById('favorites-modal').style.display='flex';return}body.innerHTML=`<div class="fav-list ${compact?'compact':''}">${items.map(e=>renderFavoriteCard(e,compact)).join('')}</div>`;document.getElementById('favorites-modal').style.display='flex'}function renderUpdateEntryCard(entry,compact=true){return `<div class="fav-card ${compact?'compact':''}"><div class="fav-card-top"><span class="fav-brand" style="color:${entry.color||'var(--c-ds)'};">${escapeHtml(entry.brand||entry.section||'기타')}</span><span class="updates-chip">${escapeHtml(entry.section||'업데이트')}</span></div><button class="fav-title-btn" type="button" ${entry.eventId?`onclick="openSingleModal('${entry.eventId}')"`:''}>${escapeHtml(entry.title||'제목 없음')}</button><div class="fav-meta"><div class="fav-field"><span class="fav-field-label">날짜</span><span class="fav-field-value">${escapeHtml(entry.date||'-')}</span></div><div class="fav-field"><span class="fav-field-label">브랜드</span><span class="fav-field-value">${escapeHtml(entry.brand||'-')}</span></div><div class="fav-field"><span class="fav-field-label">링크</span><span class="fav-field-value">${entry.link?`<a class="fav-link" href="${escapeHtml(entry.link)}" target="_blank" rel="noopener noreferrer">바로가기</a>`:'-'}</span></div></div></div>`}function attachUpdateEventIds(items){return items.map(item=>{const match=allEvents.find(e=>e.title===item.title&&e.brandName===item.brand&&(e.rawDateText===item.date||e.startDate===String(item.date||'').split(' ')[0]));return {...item,color:(match&&match.color)||'var(--c-ds)',eventId:match&&match.id}})}function openUpdatesModal(){const body=document.getElementById('updates-modal-body');const summary=changeSummary.summary||{added:0,removed:0,changed:0};const added=attachUpdateEventIds(changeSummary.recent_added||[]).slice().reverse();const changed=Object.values(changeSummary.sources||{}).flatMap(source=>source.changed||[]).map(change=>change.after||change.before||{});const removed=Object.values(changeSummary.sources||{}).flatMap(source=>source.removed||[]);let html=`<div class="updates-summary"><span class="updates-chip">새 일정 ${summary.added||0}</span><span class="updates-chip">변경 ${summary.changed||0}</span><span class="updates-chip">삭제 ${summary.removed||0}</span></div>`;html+=`<div class="updates-heading">이번 업데이트에서 새로 추가됨</div>${added.length?`<div class="fav-list compact">${added.map(item=>renderUpdateEntryCard(item,true)).join('')}</div>`:'<div class="fav-empty">새로 추가된 일정이 없습니다.</div>'}`;if(changed.length){html+=`<div class="updates-heading">변경된 일정</div><div class="fav-list compact">${attachUpdateEventIds(changed).map(item=>renderUpdateEntryCard(item,true)).join('')}</div>`}if(removed.length){html+=`<div class="updates-heading">사라진 일정</div><div class="fav-list compact">${removed.map(item=>renderUpdateEntryCard({...item,color:'var(--c-ds)'},true)).join('')}</div>`}body.innerHTML=html;document.getElementById('updates-modal').style.display='flex'}
    function openMemo(dateStr){selectedMemoDate=dateStr;const memo=JSON.parse(localStorage.getItem('imas_memo')||'{}')[dateStr]||{memo:'',color:''};document.getElementById('memo-date-title').innerText=`${dateStr} 메모`;document.getElementById('memo-text').value=memo.memo||'';setMemoColor(memo.color||'');document.getElementById('memo-modal').style.display='flex'}
    function setMemoColor(color){selectedMemoColor=color;document.querySelectorAll('.color-opt').forEach(n=>n.classList.remove('selected'));document.getElementById(`c-${color||'none'}`).classList.add('selected')}
    function saveMemo(){const memos=JSON.parse(localStorage.getItem('imas_memo')||'{}');memos[selectedMemoDate]={memo:document.getElementById('memo-text').value,color:selectedMemoColor};localStorage.setItem('imas_memo',JSON.stringify(memos));closeMemo(true);renderCalendar()}
    function closeMemo(force=false){if(force||event.target.id==='memo-modal')document.getElementById('memo-modal').style.display='none'}
    function openSingleModal(id){const e=window.eventDataMap[id];if(!e)return;document.getElementById('s-modal-brand').innerText=e.brandName;document.getElementById('s-modal-brand').style.backgroundColor=e.color;document.getElementById('s-modal-title').innerText=e.title;document.getElementById('s-modal-date').innerText=e.rawDateText||e.startDate;document.getElementById('s-modal-category').innerText=e.category;updateSingleModalFavorite(e);const link=document.getElementById('s-modal-link');if(e.link){link.style.display='inline-block';link.href=e.link}else link.style.display='none';document.getElementById('single-modal').style.display='flex'}
    function openGroupModal(groupId){const data=window.groupDataMap[groupId];if(!data)return;document.getElementById('g-modal-brand').innerText=data.brand;document.getElementById('g-modal-brand').style.backgroundColor=data.color;document.getElementById('g-modal-title').innerText=data.title;document.getElementById('g-modal-body').innerHTML=data.events.map(e=>`<div class="group-item" style="border-left-color:${data.color};"><div><strong>${escapeHtml(e.title)}</strong></div><div>기간: ${escapeHtml(e.rawDateText||e.startDate)}</div><div>분류: ${escapeHtml(e.category)}</div>${e.link?`<a class="modal-link" href="${escapeHtml(e.link)}" target="_blank" rel="noopener noreferrer">자세히 보기</a>`:''}</div>`).join('');document.getElementById('group-modal').style.display='flex'}
    function closeModal(id,force){if(force||event.target.id===id)document.getElementById(id).style.display='none'}
    document.getElementById('btn-today').addEventListener('click',()=>{currentDate=new Date();setViewMode('week');renderCalendar()});
    document.getElementById('btn-favorites').addEventListener('click',openFavoritesModal);document.getElementById('btn-updates').addEventListener('click',openUpdatesModal);
    document.getElementById('btn-prev').addEventListener('click',()=>{if(viewMode==='month')currentDate.setMonth(currentDate.getMonth()-1);else if(viewMode==='week')currentDate.setDate(currentDate.getDate()-7);else currentDate.setDate(currentDate.getDate()-14);renderCalendar()});
    document.getElementById('btn-next').addEventListener('click',()=>{if(viewMode==='month')currentDate.setMonth(currentDate.getMonth()+1);else if(viewMode==='week')currentDate.setDate(currentDate.getDate()+7);else currentDate.setDate(currentDate.getDate()+14);renderCalendar()});
    document.getElementById('btn-month').addEventListener('click',()=>{setViewMode('month');renderCalendar()});
    document.getElementById('btn-week').addEventListener('click',()=>{setViewMode('week');renderCalendar()});
    document.getElementById('btn-list').addEventListener('click',()=>{setViewMode('list');renderCalendar()});
    document.getElementById('btn-theme').addEventListener('click',()=>applyTheme(document.body.classList.contains('dark')?'light':'dark'));
    document.querySelectorAll('.filter-section input,.filter-section select,#chk-hol-kr,#chk-hol-jp').forEach(n=>n.addEventListener('change',renderCalendar));
    syncFavoriteCompactButton();loadData();
  </script>
</body>
